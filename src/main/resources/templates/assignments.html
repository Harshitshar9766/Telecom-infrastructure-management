<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Maintenance Assignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Tower Dashboard</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/towers">Towers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/errors/report">Report Error</a></li>
                    <li class="nav-item"><a class="nav-link" href="/technicians">Technicians</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assignments">Maintenance</a></li>
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Assign Technician</h2>
        <form th:action="@{/assignments}" th:object="${assignment}" method="post">
            <div class="mb-3">
                <label class="form-label">Tower</label>
                <select class="form-select" th:field="*{towerId}">
                    <option th:each="tower : ${towers}" th:value="${tower.towerId}"
                        th:text="${tower.location + ' (' + tower.region + ')'}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Technician</label>
                <select class="form-select" th:field="*{techId}">
                    <option th:each="tech : ${technicians}" th:value="${tech.techId}" th:text="${tech.name}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">ETA Hours</label>
                <input type="number" class="form-control" th:field="*{etaHours}" required />
            </div>
            <button type="submit" class="btn btn-primary">Assign</button>
        </form>

        <h3 class="mt-4">Assignments</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Tower</th>
                    <th>Technician</th>
                    <th>ETA</th>
                    <th>Status</th>
                    <th>Assigned Time</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="a : ${assignments}">
                    <td th:text="${a.assignmentId}"></td>
                    <td th:text="${a.towerId}"></td>
                    <td th:text="${a.techId}"></td>
                    <td th:text="${a.etaHours}"></td>
                    <td th:text="${a.status}"></td>
                    <td th:text="${a.assignedTime}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
