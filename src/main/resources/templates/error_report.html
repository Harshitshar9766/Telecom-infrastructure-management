<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Report Error</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Tower Dashboard</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/towers">Towers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/errors/report">Report Error</a></li>
                    <li class="nav-item"><a class="nav-link" href="/technicians">Technicians</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assignments">Maintenance</a></li>
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Report Tower Error</h2>
        <form th:action="@{/errors/report}" th:object="${errorReport}" method="post">
            <div class="mb-3">
                <label class="form-label">Tower ID</label>
                <input type="number" class="form-control" th:field="*{towerId}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Error Type</label>
                <input type="text" class="form-control" th:field="*{errorType}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Priority</label>
                <select class="form-select" th:field="*{priority}">
                    <option th:each="p : ${T(com.example.towerdashboard.model.Priority).values()}" th:value="${p}"
                        th:text="${p}"></option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Description</label>
                <textarea class="form-control" th:field="*{description}"></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
    </div>
</body>

</html>
