<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Tower List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Tower Dashboard</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/towers">Towers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/errors/report">Report Error</a></li>
                    <li class="nav-item"><a class="nav-link" href="/technicians">Technicians</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assignments">Maintenance</a></li>
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>All Towers</h2>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Location</th>
                    <th>City</th>
                    <th>Region</th>
                    <th>Status</th>
                    <th>Last Updated</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tower : ${towers}">
                    <td th:text="${tower.towerId}"></td>
                    <td th:text="${tower.location}"></td>
                    <td th:text="${tower.city}"></td>
                    <td th:text="${tower.region}"></td>
                    <td th:text="${tower.status}"></td>
                    <td th:text="${tower.lastUpdated}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
