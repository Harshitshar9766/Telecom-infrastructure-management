<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8" />
    <title>Technicians</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Tower Dashboard</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/towers">Towers</a></li>
                    <li class="nav-item"><a class="nav-link" href="/errors/report">Report Error</a></li>
                    <li class="nav-item"><a class="nav-link" href="/technicians">Technicians</a></li>
                    <li class="nav-item"><a class="nav-link" href="/assignments">Maintenance</a></li>
                    <li class="nav-item"><a class="nav-link" href="/">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container">
        <h2>Add Technician</h2>
        <form th:action="@{/technicians}" th:object="${technician}" method="post">
            <div class="mb-3">
                <label class="form-label">Name</label>
                <input type="text" class="form-control" th:field="*{name}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Phone</label>
                <input type="text" class="form-control" th:field="*{phone}" required />
            </div>
            <div class="mb-3">
                <label class="form-label">Region</label>
                <input type="text" class="form-control" th:field="*{region}" required />
            </div>
            <button type="submit" class="btn btn-primary">Add</button>
        </form>

        <h3 class="mt-4">Technician List</h3>
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Region</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="tech : ${technicians}">
                    <td th:text="${tech.techId}"></td>
                    <td th:text="${tech.name}"></td>
                    <td th:text="${tech.phone}"></td>
                    <td th:text="${tech.region}"></td>
                </tr>
            </tbody>
        </table>
    </div>
</body>

</html>
